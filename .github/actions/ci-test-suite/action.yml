name: CI test suite
description: Install cxx siblings, verify constraints, MongoDB, Playwright, and run pytest
inputs:
  python-version:
    description: Python version to install via uv
    required: true
    default: "3.12"
  mongodb-version:
    description: MongoDB major.minor for Linux (Docker) and Windows (preinstalled Server path)
    required: true
    default: "7.0"
  runner-os:
    description: Host runner OS from the calling workflow (Linux, Windows, or macOS)
    required: true
runs:
  using: composite
  steps:
    - name: Set up Python
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Setup Windows build
      if: runner.os == 'Windows'
      uses: ./.github/actions/setup-windows-build

    - name: Resolve corresponding cxx10x branch
      id: cxx10x_branch
      shell: bash
      run: |
        candidates=()
        if [ -n "${{ github.head_ref }}" ]; then
          candidates+=("${{ github.head_ref }}")
        fi
        if [ -n "${{ github.base_ref }}" ]; then
          candidates+=("${{ github.base_ref }}")
        else
          candidates+=("${{ github.ref_name }}")
        fi
        candidates+=("main")
        branch=$("${{ github.workspace }}/.github/scripts/resolve-sibling-branch.sh" \
          "https://github.com/10x-software/cxx10x.git" \
          "${candidates[@]}")
        echo "branch=$branch" >> "$GITHUB_OUTPUT"
        echo "Using cxx10x branch: $branch"

    - name: Checkout kernel/infra
      shell: bash
      run: |
        rm -rf ../cxx10x
        git clone --branch "${{ steps.cxx10x_branch.outputs.branch }}" \
          https://github.com/10x-software/cxx10x.git ../cxx10x

    - name: Enable Windows ASan build for the cxx10x backend
      if: inputs.runner-os == 'Windows'
      shell: bash
      run: |
        # The Windows crash is an intermittent access violation that needs full-suite context and
        # would not reproduce under isolated stress. Rather than gamble on catching the fault,
        # instrument the C++ backend with AddressSanitizer: cxx10x supports it via
        # ENABLE_SANITIZERS=ON at build time. ASan then detects the invalid memory access (heap
        # overflow / use-after-free / wild pointer) deterministically and reports the faulting +
        # allocation/free C/C++ stacks - and also prints a symbolized backtrace on a raw SEGV.
        #
        # /Z7 + linker /DEBUG give ASan the PDBs it needs to symbolize (kept as insurance in case
        # the sanitizer preset omits debug info). XX_UV_INCREMENTAL keeps the .pyd/.pdb in a
        # persistent build dir. -DCMAKE_BUILD_TYPE=Release keeps cxx10x's stub-output resolver
        # pointed at the Release dir (it reads ${CMAKE_BUILD_TYPE}, which scikit-build-core leaves
        # empty under the VS multi-config generator).
        #
        # NOTE: ASan is incompatible with /GL (whole-program opt / LTCG); cxx10x's ENABLE_SANITIZERS
        # path is expected to drop it. If the build fails on that, the fix belongs upstream.
        echo "ENABLE_SANITIZERS=ON" >> "$GITHUB_ENV"
        echo "XX_UV_INCREMENTAL=1" >> "$GITHUB_ENV"
        echo "SKBUILD_CMAKE_ARGS=${SKBUILD_CMAKE_ARGS};-DCMAKE_BUILD_TYPE=Release;-DCMAKE_CXX_FLAGS=/Z7;-DCMAKE_SHARED_LINKER_FLAGS=/DEBUG;-DCMAKE_EXE_LINKER_FLAGS=/DEBUG" >> "$GITHUB_ENV"

    - name: Install dependencies
      shell: bash
      env:
        WAIT_FOR_SIBLING_BRANCH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.cxx10x_branch.outputs.branch || '' }}
      run: |
        uv venv
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        python -m dev_10x.uv_sync py10x-core-dev --all-extras

    # uv-sync applies -c constraints.txt on every install, so the test env is frozen. Assert every
    # installed third-party dist is pinned (catches a py10x or sibling dep that escaped the freeze).
    - name: Verify env is fully frozen against constraints.txt
      shell: bash
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        xx-constraints check

    - name: Setup Mongo replica set
      uses: ./.github/actions/setup-mongo-replica-set
      with:
        mongodb-version: ${{ inputs.mongodb-version }}

    - name: Install Playwright chromium
      shell: bash
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        playwright install --with-deps chromium

    - name: Stage ASan runtime next to the instrumented .pyd
      if: inputs.runner-os == 'Windows'
      shell: pwsh
      run: |
        # The ASan-instrumented .pyd links clang_rt.asan_dynamic-x86_64.dll. Python 3.8+ does NOT
        # search PATH for an extension module's dependency DLLs, so having the MSVC bin dir on PATH
        # isn't enough - the runtime must sit in a directory the loader checks for the .pyd's
        # imports. The .pyd's own directory always is, so copy it next to each built module.
        $asanDir = Join-Path $env:VCToolsInstallDir 'bin\Hostx64\x64'
        $asan = Get-ChildItem -Path $asanDir -Filter 'clang_rt.asan_dynamic-x86_64.dll' `
                  -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
        if (-not $asan) {
          $asan = Get-ChildItem -Path $env:VCToolsInstallDir -Recurse `
                    -Filter 'clang_rt.asan_dynamic-x86_64.dll' -ErrorAction SilentlyContinue |
                    Select-Object -First 1 -ExpandProperty FullName
        }
        if (-not $asan) { throw 'ASan runtime clang_rt.asan_dynamic-x86_64.dll not found under VCToolsInstallDir' }
        Write-Host "ASan runtime: $asan"
        $buildRoot = Join-Path $env:GITHUB_WORKSPACE '.venv\py10x-build'
        $pyds = Get-ChildItem -Path $buildRoot -Recurse -Filter '*.pyd' -ErrorAction SilentlyContinue
        if (-not $pyds) { throw "no built .pyd found under $buildRoot" }
        foreach ($d in ($pyds | ForEach-Object { $_.DirectoryName } | Sort-Object -Unique)) {
          Copy-Item -Path $asan -Destination $d -Force
          Write-Host "staged ASan runtime -> $d"
        }

    - name: Run full test suite
      shell: bash
      env:
        PYTHONUNBUFFERED: "1"
        # In-process fatal-error handler: dumps the Python traceback (all threads) to stderr on a
        # native crash, inherited by subprocesses. Names the test/line alongside the ASan report.
        PYTHONFAULTHANDLER: "1"
        # Strict only where fully provisioned: the Linux runner gets a replica set (transactions),
        # but Windows is standalone by design, so leave strict OFF there - the transaction gate must
        # skip, not fail, on Windows. (git/uv/source/siblings are present on both, so those guards
        # run regardless; strict only flips an *unmet* precondition from skip to fail.)
        XX_TEST_STRICT: ${{ inputs.runner-os == 'Windows' && '0' || '1' }}
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        if [ "${{ inputs.runner-os }}" != "Windows" ]; then
          python -m pytest
        else
          # The cxx10x backend is ASan-instrumented (ENABLE_SANITIZERS build), so it detects the
          # bad memory access itself and prints a symbolized C/C++ report - no debugger needed.
          # Run the FULL suite once: the fault needs full-suite context (40x of the suspect module
          # in isolation never reproduced it). `-s` keeps native stderr uncaptured so the report
          # reaches the job log; ASAN_OPTIONS also mirrors it to a file (relative log_path avoids
          # the drive-letter ':' clashing with the option separator) as a backup in case the
          # process dies mid-capture. alloc_dealloc_mismatch=0 suppresses false positives from
          # cxx10x-allocated memory freed by the uninstrumented Python/CRT.
          mkdir -p asan
          export ASAN_OPTIONS="halt_on_error=1:abort_on_error=0:alloc_dealloc_mismatch=0:detect_leaks=0:log_path=asan/asan"
          set +e
          python -m pytest -s
          code=$?
          set -e
          echo "pytest exit code: ${code}"
          for f in asan/asan.*; do
            [ -e "$f" ] || continue
            echo "===== ASan report: ${f} ====="
            cat "$f"
          done
          exit "${code}"
        fi

    - name: Upload Windows ASan report
      if: failure() && inputs.runner-os == 'Windows'
      uses: actions/upload-artifact@v7
      with:
        name: windows-asan-report-${{ github.run_id }}
        path: asan/asan.*
        if-no-files-found: warn
