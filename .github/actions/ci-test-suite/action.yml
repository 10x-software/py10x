name: CI test suite
description: Install cxx siblings, verify constraints, MongoDB, Playwright, and run pytest
inputs:
  python-version:
    description: Python version to install via uv
    required: true
    default: "3.12"
  mongodb-version:
    description: MongoDB major.minor for Linux (Docker) and Windows (preinstalled Server path)
    required: true
    default: "7.0"
runs:
  using: composite
  steps:
    - name: Set up Python
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Checkout kernel/infra
      shell: bash
      run: git clone https://github.com/10x-software/cxx10x.git ../cxx10x

    - name: Install dependencies
      shell: bash
      run: uvx --from ".[dev]" uv-sync py10x-core-dev --all-extras

    # uv-sync applies -c constraints.txt on every install, so the test env is frozen. Assert every
    # installed third-party dist is pinned (catches a py10x or sibling dep that escaped the freeze).
    - name: Verify env is fully frozen against constraints.txt
      shell: bash
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        xx-constraints check

    - name: Start MongoDB (single-node replica set)
      if: runner.os != 'Windows'
      uses: supercharge/mongodb-github-action@1.12.1
      with:
        mongodb-version: ${{ inputs.mongodb-version }}
        mongodb-replica-set: rs0
        mongodb-port: 27017

    # Standalone MongoDB is enough on Windows; transaction tests skip when replica set is absent.
    - name: Start MongoDB (standalone)
      if: runner.os == 'Windows'
      shell: bash
      env:
        MONGODB_DATA_DIR: ${{ runner.temp }}/mongodb-data
        MONGOD: /c/Program Files/MongoDB/Server/${{ inputs.mongodb-version }}/bin/mongod.exe
      run: |
        if [ ! -x "$MONGOD" ]; then
          echo "mongod.exe not found at $MONGOD (expected MongoDB ${{ inputs.mongodb-version }} on runner)" >&2
          exit 1
        fi
        mkdir -p "$MONGODB_DATA_DIR"
        "$MONGOD" --dbpath "$MONGODB_DATA_DIR" --port 27017 --bind_ip 127.0.0.1 \
          > "$MONGODB_DATA_DIR/mongod.log" 2>&1 &

        deadline=$(( $(date +%s) + 30 ))
        while true; do
          if mongosh "mongodb://127.0.0.1:27017" --quiet --eval "db.adminCommand('ping')"; then
            break
          fi
          if [ "$(date +%s)" -ge "$deadline" ]; then
            echo "MongoDB did not start within 30 seconds" >&2
            cat "$MONGODB_DATA_DIR/mongod.log" >&2 || true
            exit 1
          fi
          sleep 1
        done

    - name: Install Playwright chromium
      shell: bash
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        playwright install --with-deps chromium

    - name: Run full test suite
      shell: bash
      env:
        PYTHONUNBUFFERED: "1"
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        pytest
