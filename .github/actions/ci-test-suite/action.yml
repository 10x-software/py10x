name: CI test suite
description: Install cxx siblings, verify constraints, MongoDB, Playwright, and run pytest
inputs:
  python-version:
    description: Python version to install via uv
    required: true
    default: "3.12"
  mongodb-version:
    description: MongoDB major.minor for Linux (Docker) and Windows (preinstalled Server path)
    required: true
    default: "7.0"
  runner-os:
    description: Host runner OS from the calling workflow (Linux, Windows, or macOS)
    required: true
runs:
  using: composite
  steps:
    - name: Set up Python
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Resolve corresponding cxx10x branch
      id: cxx10x_branch
      shell: bash
      run: |
        candidates=()
        if [ -n "${{ github.head_ref }}" ]; then
          candidates+=("${{ github.head_ref }}")
        fi
        if [ -n "${{ github.base_ref }}" ]; then
          candidates+=("${{ github.base_ref }}")
        else
          candidates+=("${{ github.ref_name }}")
        fi
        candidates+=("main")
        branch=$("${{ github.workspace }}/.github/scripts/resolve-sibling-branch.sh" \
          "https://github.com/10x-software/cxx10x.git" \
          "${candidates[@]}")
        echo "branch=$branch" >> "$GITHUB_OUTPUT"
        echo "Using cxx10x branch: $branch"

    - name: Checkout kernel/infra
      shell: bash
      run: |
        rm -rf ../cxx10x
        git clone --branch "${{ steps.cxx10x_branch.outputs.branch }}" \
          https://github.com/10x-software/cxx10x.git ../cxx10x

    - name: Install dependencies
      shell: bash
      env:
        WAIT_FOR_SIBLING_BRANCH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.cxx10x_branch.outputs.branch || '' }}
      run: |
        uv venv
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        python -m dev_10x.uv_sync py10x-core-dev --all-extras

    # uv-sync applies -c constraints.txt on every install, so the test env is frozen. Assert every
    # installed third-party dist is pinned (catches a py10x or sibling dep that escaped the freeze).
    - name: Verify env is fully frozen against constraints.txt
      shell: bash
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        xx-constraints check

    - name: Setup Mongo replica set
      uses: ./.github/actions/setup-mongo-replica-set
      with:
        mongodb-version: ${{ inputs.mongodb-version }}

    - name: Install Playwright chromium
      shell: bash
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        playwright install --with-deps chromium

    - name: Enable Windows crash dumps
      if: inputs.runner-os == 'Windows'
      shell: pwsh
      run: |
        $dumpFolder = Join-Path $env:RUNNER_TEMP 'crashdumps'
        New-Item -ItemType Directory -Force -Path $dumpFolder | Out-Null
        $procdumpZip = Join-Path $env:RUNNER_TEMP 'procdump.zip'
        $procdumpDir = Join-Path $env:RUNNER_TEMP 'procdump'
        Invoke-WebRequest -Uri 'https://download.sysinternals.com/files/Procdump.zip' -OutFile $procdumpZip
        Expand-Archive -Path $procdumpZip -DestinationPath $procdumpDir -Force
        $procdump = Join-Path $procdumpDir 'procdump64.exe'
        & $procdump -accepteula -ma -i $dumpFolder
        Write-Host "ProcDump registered as post-mortem debugger; dumps -> $dumpFolder"

    - name: Run full test suite
      shell: bash
      env:
        PYTHONUNBUFFERED: "1"
        # Strict only where fully provisioned: the Linux runner gets a replica set (transactions),
        # but Windows is standalone by design, so leave strict OFF there - the transaction gate must
        # skip, not fail, on Windows. (git/uv/source/siblings are present on both, so those guards
        # run regardless; strict only flips an *unmet* precondition from skip to fail.)
        XX_TEST_STRICT: ${{ inputs.runner-os == 'Windows' && '0' || '1' }}
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        python -m pytest

    - name: Upload Windows minidump
      if: failure() && inputs.runner-os == 'Windows'
      uses: actions/upload-artifact@v7
      with:
        name: windows-minidump-${{ github.run_id }}
        path: ${{ runner.temp }}/crashdumps/*.dmp
        if-no-files-found: warn
