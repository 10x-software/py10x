name: CI test suite
description: Install cxx siblings, verify constraints, MongoDB, Playwright, and run pytest
inputs:
  python-version:
    description: Python version to install via uv
    required: true
    default: "3.12"
  mongodb-version:
    description: MongoDB major.minor for Linux (Docker) and Windows (preinstalled Server path)
    required: true
    default: "7.0"
  runner-os:
    description: Host runner OS from the calling workflow (Linux, Windows, or macOS)
    required: true
runs:
  using: composite
  steps:
    - name: Set up Python
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Setup Windows build
      if: runner.os == 'Windows'
      uses: ./.github/actions/setup-windows-build

    - name: Resolve corresponding cxx10x branch
      id: cxx10x_branch
      shell: bash
      run: |
        candidates=()
        if [ -n "${{ github.head_ref }}" ]; then
          candidates+=("${{ github.head_ref }}")
        fi
        if [ -n "${{ github.base_ref }}" ]; then
          candidates+=("${{ github.base_ref }}")
        else
          candidates+=("${{ github.ref_name }}")
        fi
        candidates+=("main")
        branch=$("${{ github.workspace }}/.github/scripts/resolve-sibling-branch.sh" \
          "https://github.com/10x-software/cxx10x.git" \
          "${candidates[@]}")
        echo "branch=$branch" >> "$GITHUB_OUTPUT"
        echo "Using cxx10x branch: $branch"

    - name: Checkout kernel/infra
      shell: bash
      run: |
        rm -rf ../cxx10x
        git clone --branch "${{ steps.cxx10x_branch.outputs.branch }}" \
          https://github.com/10x-software/cxx10x.git ../cxx10x

    - name: Select Windows Debug build (native crash diagnosis)
      if: inputs.runner-os == 'Windows'
      shell: bash
      run: |
        # Build the cxx10x C++ backend in Debug so a crash yields full PDBs and unoptimized,
        # symbolized C++ frames (plus active asserts). XX_UV_INCREMENTAL routes the local sibling
        # installs through the no-build-isolation path that honors XX_UV_BUILD_TYPE (see
        # dev_10x/uv_sync.py::_incremental_flags). These persist to the install + test steps.
        echo "XX_UV_INCREMENTAL=1" >> "$GITHUB_ENV"
        echo "XX_UV_BUILD_TYPE=Debug" >> "$GITHUB_ENV"

    - name: Install dependencies
      shell: bash
      env:
        WAIT_FOR_SIBLING_BRANCH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.cxx10x_branch.outputs.branch || '' }}
      run: |
        uv venv
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        python -m dev_10x.uv_sync py10x-core-dev --all-extras

    # uv-sync applies -c constraints.txt on every install, so the test env is frozen. Assert every
    # installed third-party dist is pinned (catches a py10x or sibling dep that escaped the freeze).
    - name: Verify env is fully frozen against constraints.txt
      shell: bash
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        xx-constraints check

    - name: Setup Mongo replica set
      uses: ./.github/actions/setup-mongo-replica-set
      with:
        mongodb-version: ${{ inputs.mongodb-version }}

    - name: Install Playwright chromium
      shell: bash
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        playwright install --with-deps chromium

    - name: Locate cdb for native crash capture
      if: inputs.runner-os == 'Windows'
      shell: pwsh
      run: |
        # cdb (Debugging Tools for Windows) launches pytest and, unlike an attach-only tool,
        # follows child processes (-o) and prints the faulting thread's C/C++ stack itself.
        $dumpFolder = Join-Path $env:RUNNER_TEMP 'crashdumps'
        New-Item -ItemType Directory -Force -Path $dumpFolder | Out-Null
        $cdb = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\Debuggers\x64\cdb.exe' `
                 -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
        if (-not $cdb) {
          $cdb = Get-ChildItem 'C:\Program Files*\Windows Kits\*\Debuggers\x64\cdb.exe' -Recurse `
                   -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
        }
        if (-not $cdb) { throw 'cdb.exe not found - Debugging Tools for Windows is not installed on this runner' }
        "CDB_PATH=$cdb" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        Write-Host "cdb located: $cdb"

    - name: Run full test suite
      shell: bash
      env:
        PYTHONUNBUFFERED: "1"
        # In-process fatal-error handler: dumps the Python traceback (all threads) to stderr on a
        # native crash, and is inherited by any subprocess. Complements cdb's C/C++ stack below by
        # naming the test/line, and is the sole signal on Linux.
        PYTHONFAULTHANDLER: "1"
        # Strict only where fully provisioned: the Linux runner gets a replica set (transactions),
        # but Windows is standalone by design, so leave strict OFF there - the transaction gate must
        # skip, not fail, on Windows. (git/uv/source/siblings are present on both, so those guards
        # run regardless; strict only flips an *unmet* precondition from skip to fail.)
        XX_TEST_STRICT: ${{ inputs.runner-os == 'Windows' && '0' || '1' }}
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        if [ "${{ inputs.runner-os }}" != "Windows" ]; then
          python -m pytest
        else
          # Run pytest under cdb so a native (C++) fault in the cxx10x backend prints its C/C++
          # call stack to the job log. cdb -o follows child processes, so a crash in a spawned
          # worker is caught too - unlike the earlier procdump attach, which watched only the
          # parent and therefore saw nothing but the process exit. A Git-bash wrapper records
          # pytest's real exit code so ordinary test failures still fail the step; a crash aborts
          # before the code is written, so we default to failure.
          cdb="$(cygpath -u "$CDB_PATH")"
          bash_win="$(cygpath -w "$(command -v bash)")"
          dump_win="$(cygpath -w "${RUNNER_TEMP}/crashdumps/pytest_crash.dmp")"
          rc_file="${RUNNER_TEMP}/pytest_rc"
          cmds_file="${RUNNER_TEMP}/cdb_cmds.txt"
          rm -f "$rc_file"
          # PDBs sit next to the Debug .pyd; cdb finds them by adjacency. Point the symbol path at
          # the editable build tree as a backstop.
          export _NT_SYMBOL_PATH="$(cygpath -w "${GITHUB_WORKSPACE}/.venv")"
          # On a fatal (second-chance) native fault: every thread's C/C++ stack, !analyze, a full
          # minidump, then kill the tree and quit. First-chance breaks stay off (sxd) so benign
          # first-chance exceptions from Python/MSYS do not stop the run; `ii` is always fatal.
          capture="~*kP 128; !analyze -v; .dump /ma ${dump_win}; .kill; qq"
          {
            echo "sxd -c2 \"${capture}\" av"
            echo "sxd -c2 \"${capture}\" sov"
            echo "sxd -c2 \"${capture}\" sbo"
            echo "sxe  -c \"${capture}\" ii"
            echo "g"
          } > "$cmds_file"
          "$cdb" -g -G -o -cf "$(cygpath -w "$cmds_file")" \
            "$bash_win" -c "cd '$(pwd)' && source .venv/Scripts/activate && python -m pytest; echo \$? > '${rc_file}'"
          code="$(cat "$rc_file" 2>/dev/null || echo 1)"
          echo "pytest exit code: ${code}"
          exit "${code}"
        fi

    - name: Upload Windows minidump
      if: failure() && inputs.runner-os == 'Windows'
      uses: actions/upload-artifact@v7
      with:
        name: windows-minidump-${{ github.run_id }}
        path: ${{ runner.temp }}/crashdumps/*.dmp
        if-no-files-found: warn
