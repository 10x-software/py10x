name: CI test suite
description: Install cxx siblings, verify constraints, MongoDB, Playwright, and run pytest
inputs:
  python-version:
    description: Python version to install via uv
    required: true
    default: "3.12"
  mongodb-version:
    description: MongoDB major.minor for Linux (Docker) and Windows (preinstalled Server path)
    required: true
    default: "7.0"
  runner-os:
    description: Host runner OS from the calling workflow (Linux, Windows, or macOS)
    required: true
runs:
  using: composite
  steps:
    - name: Set up Python
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Setup Windows build
      if: runner.os == 'Windows'
      uses: ./.github/actions/setup-windows-build

    - name: Resolve corresponding cxx10x branch
      id: cxx10x_branch
      shell: bash
      run: |
        candidates=()
        if [ -n "${{ github.head_ref }}" ]; then
          candidates+=("${{ github.head_ref }}")
        fi
        if [ -n "${{ github.base_ref }}" ]; then
          candidates+=("${{ github.base_ref }}")
        else
          candidates+=("${{ github.ref_name }}")
        fi
        candidates+=("main")
        branch=$("${{ github.workspace }}/.github/scripts/resolve-sibling-branch.sh" \
          "https://github.com/10x-software/cxx10x.git" \
          "${candidates[@]}")
        echo "branch=$branch" >> "$GITHUB_OUTPUT"
        echo "Using cxx10x branch: $branch"

    - name: Checkout kernel/infra
      shell: bash
      run: |
        rm -rf ../cxx10x
        git clone --branch "${{ steps.cxx10x_branch.outputs.branch }}" \
          https://github.com/10x-software/cxx10x.git ../cxx10x

    - name: Enable Windows ASan build for the cxx10x backend
      if: inputs.runner-os == 'Windows'
      shell: bash
      run: |
        # The Windows crash is an intermittent access violation that needs full-suite context and
        # would not reproduce under isolated stress. Rather than gamble on catching the fault,
        # instrument the C++ backend with AddressSanitizer: cxx10x supports it via
        # ENABLE_SANITIZERS=ON at build time. ASan then detects the invalid memory access (heap
        # overflow / use-after-free / wild pointer) deterministically and reports the faulting +
        # allocation/free C/C++ stacks - and also prints a symbolized backtrace on a raw SEGV.
        #
        # /Z7 + linker /DEBUG give ASan the PDBs it needs to symbolize (kept as insurance in case
        # the sanitizer preset omits debug info). XX_UV_INCREMENTAL keeps the .pyd/.pdb in a
        # persistent build dir. -DCMAKE_BUILD_TYPE=Release keeps cxx10x's stub-output resolver
        # pointed at the Release dir (it reads ${CMAKE_BUILD_TYPE}, which scikit-build-core leaves
        # empty under the VS multi-config generator).
        #
        # NOTE: ASan is incompatible with /GL (whole-program opt / LTCG); cxx10x's ENABLE_SANITIZERS
        # path is expected to drop it. If the build fails on that, the fix belongs upstream.
        echo "ENABLE_SANITIZERS=ON" >> "$GITHUB_ENV"
        echo "XX_UV_INCREMENTAL=1" >> "$GITHUB_ENV"
        echo "SKBUILD_CMAKE_ARGS=${SKBUILD_CMAKE_ARGS};-DCMAKE_BUILD_TYPE=Release;-DCMAKE_CXX_FLAGS=/Z7;-DCMAKE_SHARED_LINKER_FLAGS=/DEBUG;-DCMAKE_EXE_LINKER_FLAGS=/DEBUG" >> "$GITHUB_ENV"

    - name: Enable Linux ASan build for the cxx10x backend
      if: inputs.runner-os == 'Linux'
      shell: bash
      run: |
        # Hunt the *root cause* on Linux, where ASan is first-class and fast. The Windows crash is
        # heap-layout- and prior-test-dependent (a memory-corruption signature, not a deterministic
        # deep stack), and ASan detects a bad free/access regardless of platform - even though a
        # plain Linux run is green, ASan-on-Linux should still flag the corruption at its origin.
        # -fsanitize-address-use-after-scope also catches a dangling reference to a *stack* object
        # (use-after-scope), which plain ASan misses unless the build enables it explicitly.
        echo "ENABLE_SANITIZERS=ON" >> "$GITHUB_ENV"
        echo "SKBUILD_CMAKE_ARGS=-DCMAKE_CXX_FLAGS=-fsanitize-address-use-after-scope" >> "$GITHUB_ENV"

    - name: Install dependencies
      shell: bash
      env:
        WAIT_FOR_SIBLING_BRANCH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.cxx10x_branch.outputs.branch || '' }}
      run: |
        uv venv
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        python -m dev_10x.uv_sync py10x-core-dev --all-extras

    # uv-sync applies -c constraints.txt on every install, so the test env is frozen. Assert every
    # installed third-party dist is pinned (catches a py10x or sibling dep that escaped the freeze).
    - name: Verify env is fully frozen against constraints.txt
      shell: bash
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        xx-constraints check

    - name: Setup Mongo replica set
      uses: ./.github/actions/setup-mongo-replica-set
      with:
        mongodb-version: ${{ inputs.mongodb-version }}

    - name: Install Playwright chromium
      shell: bash
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        playwright install --with-deps chromium

    - name: Stage ASan runtime next to the instrumented .pyd
      if: inputs.runner-os == 'Windows'
      shell: pwsh
      run: |
        # The ASan-instrumented .pyd links clang_rt.asan_dynamic-x86_64.dll. Python 3.8+ does NOT
        # search PATH for an extension module's dependency DLLs; the loader only checks system
        # dirs, the Python executable's own directory, and the directory of the .pyd being loaded.
        # The editable install rebuilds+installs the .pyd into site-packages at import time, so
        # stage the runtime into the venv Scripts dir (the executable dir, always searched) AND
        # every dir that holds a built/installed .pyd under the venv.
        $asanDir = Join-Path $env:VCToolsInstallDir 'bin\Hostx64\x64'
        $asan = Get-ChildItem -Path $asanDir -Filter 'clang_rt.asan_dynamic-x86_64.dll' `
                  -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
        if (-not $asan) {
          $asan = Get-ChildItem -Path $env:VCToolsInstallDir -Recurse `
                    -Filter 'clang_rt.asan_dynamic-x86_64.dll' -ErrorAction SilentlyContinue |
                    Select-Object -First 1 -ExpandProperty FullName
        }
        if (-not $asan) { throw 'ASan runtime clang_rt.asan_dynamic-x86_64.dll not found under VCToolsInstallDir' }
        Write-Host "ASan runtime: $asan"
        $venv = Join-Path $env:GITHUB_WORKSPACE '.venv'
        $targets = New-Object System.Collections.Generic.HashSet[string]
        [void]$targets.Add((Join-Path $venv 'Scripts'))
        Get-ChildItem -Path $venv -Recurse -Filter '*.pyd' -ErrorAction SilentlyContinue |
          ForEach-Object { [void]$targets.Add($_.DirectoryName) }
        foreach ($d in $targets) {
          if (Test-Path $d) { Copy-Item -Path $asan -Destination $d -Force; Write-Host "staged ASan runtime -> $d" }
        }
        # Diagnostic: list the instrumented module's DLL imports so a lingering load failure names
        # the exact missing dependency instead of a generic 'module could not be found'.
        $kernel = Get-ChildItem -Path $venv -Recurse -Filter 'py10x_kernel*.pyd' -ErrorAction SilentlyContinue |
                    Select-Object -First 1 -ExpandProperty FullName
        if ($kernel) {
          Write-Host "== dumpbin /dependents $kernel =="
          & dumpbin /nologo /dependents $kernel
        }

    - name: Locate cdb for stack-overflow capture
      if: inputs.runner-os == 'Windows'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path (Join-Path $env:RUNNER_TEMP 'crashdumps') | Out-Null
        $cdb = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\Debuggers\x64\cdb.exe' `
                 -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
        if (-not $cdb) {
          $cdb = Get-ChildItem 'C:\Program Files*\Windows Kits\*\Debuggers\x64\cdb.exe' -Recurse `
                   -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
        }
        if (-not $cdb) { throw 'cdb.exe not found - Debugging Tools for Windows is not installed on this runner' }
        "CDB_PATH=$cdb" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        Write-Host "cdb located: $cdb"

    - name: Run full test suite
      shell: bash
      env:
        PYTHONUNBUFFERED: "1"
        # In-process fatal-error handler: dumps the Python traceback (all threads) to stderr on a
        # native crash, inherited by subprocesses. Names the test/line alongside the native stack.
        PYTHONFAULTHANDLER: "1"
        # Strict only where fully provisioned: the Linux runner gets a replica set (transactions),
        # but Windows is standalone by design, so leave strict OFF there - the transaction gate must
        # skip, not fail, on Windows. (git/uv/source/siblings are present on both, so those guards
        # run regardless; strict only flips an *unmet* precondition from skip to fail.)
        XX_TEST_STRICT: ${{ inputs.runner-os == 'Windows' && '0' || '1' }}
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        if [ "${{ inputs.runner-os }}" != "Windows" ]; then
          # Linux: run the ASan-instrumented backend so a use-after-free / heap-overflow in the
          # cxx10x as-of/history lifetime path is caught at its origin with alloc+free+use stacks.
          #  - LD_PRELOAD the ASan runtime: python itself is not instrumented, so the runtime must
          #    initialize before the instrumented .so loads ("ASan runtime does not come first").
          #  - Big quarantine + free-fill so a freed block stays poisoned and a dangling read is
          #    actually caught (a small default quarantine lets the block get reused -> silent).
          #  - detect_leaks=0 to avoid LSan exit-time noise; -s so the report reaches the log.
          mkdir -p asan
          libasan="$(gcc -print-file-name=libasan.so)"
          libstdcxx="$(gcc -print-file-name=libstdc++.so)"
          # Preload libstdc++ alongside libasan: third-party manylinux wheels (matplotlib/ft2font,
          # duckdb, polars) bundle their own static libstdc++ and throw C++ exceptions at import,
          # which makes ASan's __cxa_throw interceptor CHECK-fail (real___cxa_throw==0) and abort
          # before our tests run. Preloading the system libstdc++ makes the real __cxa_throw
          # resolvable so those benign throws pass through.
          echo "LD_PRELOAD -> ${libasan}:${libstdcxx}"
          export LD_PRELOAD="${libasan}:${libstdcxx}"
          # detect_odr_violation=0: suppress the benign ODR false positive where the same libstdc++
          # inline global (std::piecewise_construct) exists in both py10x_kernel.so and
          # py10x_infra.so - it aborts at import before any test runs and is not a real bug.
          export ASAN_OPTIONS="detect_leaks=0:detect_odr_violation=0:alloc_dealloc_mismatch=0:detect_stack_use_after_return=1:quarantine_size_mb=1024:max_free_fill_size=65536:halt_on_error=1:abort_on_error=0:print_stats=0:log_path=asan/asan"
          # Scope to core_10x (where test_traitable_history lives and where the pre-crash state is
          # built - it runs before infra/ui); skips the slow UI tests that time out under ASan. The
          # serialize-depth probe reports the deepest embedded-serialization per test, classifying
          # bounded-deep vs unbounded-cycle and naming the trigger.
          set +e
          python -m pytest core_10x -p serialize_depth_probe -s
          code=$?
          set -e
          echo "pytest exit code: ${code}"
          for f in asan/asan.*; do
            [ -e "$f" ] || continue
            echo "===== ASan report: ${f} ====="
            cat "$f"
          done
          exit "${code}"
        else
          # The ASan build reliably reproduces the crash: ASan inflates every stack frame with
          # redzones, so the underlying deep recursion overflows the stack much sooner. ASan itself
          # prints nothing and neither does faulthandler - the process hard-terminates with
          # 0xC0000005 and no user-mode exception dispatch, exactly what a stack overflow does (no
          # stack left to run any handler). An out-of-process debugger is the only thing that can
          # catch it: cdb receives the FIRST-chance stack-overflow (sov) at the guard page while the
          # deep call stack is still intact, and dumps it. Second-chance av and a breakpoint (an
          # ASan __debugbreak, should one ever fire) are covered so cdb never hangs on them.
          cdb="$(cygpath -u "$CDB_PATH")"
          bash_win="$(cygpath -w "$(command -v bash)")"
          dump_win="$(cygpath -w "${RUNNER_TEMP}/crashdumps/pytest_crash.dmp")"
          rc_file="${RUNNER_TEMP}/pytest_rc"; rm -f "$rc_file"
          cmds_file="${RUNNER_TEMP}/cdb_cmds.txt"
          export _NT_SYMBOL_PATH="$(cygpath -w "${GITHUB_WORKSPACE}/.venv")"
          cap="~*kP 120; !analyze -v; .dump /ma ${dump_win}; .kill; qq"
          {
            echo "sxe  -c \"${cap}\" sov"
            echo "sxd -c2 \"${cap}\" av"
            echo "sxe  -c \"${cap}\" bpe"
            echo "g"
          } > "$cmds_file"
          "$cdb" -g -G -o -cf "$(cygpath -w "$cmds_file")" \
            "$bash_win" -c "cd '$(pwd)' && source .venv/Scripts/activate && python -m pytest; echo \$? > '${rc_file}'"
          code="$(cat "$rc_file" 2>/dev/null || echo 1)"
          echo "pytest exit code: ${code}"
          exit "${code}"
        fi

    - name: Upload Windows crash dump
      if: failure() && inputs.runner-os == 'Windows'
      uses: actions/upload-artifact@v7
      with:
        name: windows-crash-dump-${{ github.run_id }}
        path: ${{ runner.temp }}/crashdumps/*.dmp
        if-no-files-found: warn
