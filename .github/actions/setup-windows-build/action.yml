name: Setup Windows build
description: >-
  MSVC dev environment via vswhere + Enter-VsDevShell, plus scikit-build cmake
  args matching cxx10x cibuildwheel wheel builds (toolset v143 version 14.44 /
  MSVC_VERSION 1944). No-op on non-Windows runners.
runs:
  using: composite
  steps:
    - name: Setup MSVC developer environment
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        $vsPath = & $vswhere -latest -property installationPath
        if (-not $vsPath) { throw "Visual Studio not found via vswhere" }
        $before = @{}
        Get-ChildItem env: | ForEach-Object { $before[$_.Name] = $_.Value }
        Import-Module (Join-Path $vsPath 'Common7\Tools\Microsoft.VisualStudio.DevShell.dll')
        Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments "-arch=amd64 -host_arch=amd64 -no_logo"
        Get-ChildItem env: | ForEach-Object {
          if ($before[$_.Name] -ne $_.Value) {
            "$($_.Name)=$($_.Value)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
        }

    # Same pin as [tool.cibuildwheel.windows.config-settings] in cxx10x core_10x/infra_10x pyproject.toml.
    - name: Export scikit-build Windows cmake args
      if: runner.os == 'Windows'
      shell: bash
      run: echo "SKBUILD_CMAKE_ARGS=-T;v143,version=14.44" >> "$GITHUB_ENV"
