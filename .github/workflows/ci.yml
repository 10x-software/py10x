name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Nightly at 02:30 UTC
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-tests:
    name: Full tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml

      - name: Set up Python
        run: uv python install 3.12

      - name: Checkout kernel/infra
        run: git clone https://github.com/10x-software/cxx10x.git ../cxx10x

      - name: Install dependencies
        run: uvx --from ".[dev]" uv-sync py10x-core-dev --all-extras

      - name: Setup Mongo replica set
        uses: ./.github/actions/setup-mongo-replica-set

      - name: Run full test suite
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          source .venv/bin/activate
          pytest
