name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Nightly at 02:30 UTC
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-tests:
    name: Full tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml

      - name: Set up Python
        run: uv python install 3.12

      - name: Checkout kernel/infra
        run: git clone https://github.com/10x-software/cxx10x.git ../cxx10x

      - name: Install dependencies
        run: uvx --from ".[dev]" uv-sync py10x-core-dev --all-extras

      # uv-sync applies -c constraints.txt on every install, so the test env is frozen. Assert every
      # installed third-party dist is pinned (catches a py10x or sibling dep that escaped the freeze).
      - name: Verify env is fully frozen against constraints.txt
        run: |
          source .venv/bin/activate
          xx-constraints check

      - name: Start MongoDB (single-node replica set)
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: "7.0"
          mongodb-replica-set: rs0
          mongodb-port: 27017

      - name: Install Playwright chromium
        run: |
          source .venv/bin/activate
          playwright install --with-deps chromium

      - name: Run full test suite
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          source .venv/bin/activate
          pytest
