name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Nightly at 02:30 UTC
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PR / push: Linux + Windows on the recommended Python (3.12).
  full-tests:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    name: Full tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml

      - name: Run test suite
        uses: ./.github/actions/ci-test-suite
        with:
          python-version: "3.12"
          mongodb-version: "7.0"

  # Nightly / manual: full OS × Python matrix (requires-python floor through recommended).
  full-matrix-tests:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: Full matrix (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml

      - name: Run test suite
        uses: ./.github/actions/ci-test-suite
        with:
          python-version: ${{ matrix.python }}
          mongodb-version: "7.0"
