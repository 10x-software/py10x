name: Publish py10x-core to PyPI (uv)
on:
  push:
    tags:
      - "pre/v*"
      - "prod/v*"
  workflow_dispatch:

jobs:
  # Pre-publish gate: the exact tagged commit must pass the suite (incl. the xx-promote PEP 440
  # assumption guards) before anything is published.
  test:
    name: Pre-publish tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Checkout kernel/infra
        run: git clone https://github.com/10x-software/cxx10x.git ../cxx10x

      # One venv on PATH for every later step; xx_ci needs only packaging + tomlkit (it is
      # kernel-free, so it can resolve tags before any sibling is installed).
      - name: Create venv + CI helper deps
        run: |
          uv venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          uv pip install -c constraints.txt packaging tomlkit

      # Resolve each sibling to the tag its *pinned spec* admits (Form A dev pin -> latest rc on an
      # rc commit; final-only pin -> latest final on a release branch), then install that tagged
      # source from the local clone.
      - name: Resolve and install siblings at their pinned tags
        run: |
          KERNEL_TAG=$(python -m dev_10x.xx_ci latest_tag py10x-kernel)
          INFRA_TAG=$(python -m dev_10x.xx_ci latest_tag py10x-infra)
          echo "kernel -> $KERNEL_TAG ; infra -> $INFRA_TAG"
          CXX_ABS=$(cd "../cxx10x" && pwd)
          uv pip install -c constraints.txt \
            "py10x-kernel @ git+file://${CXX_ABS}@${KERNEL_TAG}#subdirectory=core_10x" \
            "py10x-infra  @ git+file://${CXX_ABS}@${INFRA_TAG}#subdirectory=infra_10x"

      - name: Install py10x-core + dev/test deps
        # Additive install: the siblings from the step above already satisfy py10x-core's specs, so
        # they are kept as-is (a `uv sync` would instead reconcile them back to the index and fail
        # on an unpublished rc). --all-extras already includes the dev extra.
        run: uv pip install -e . --all-extras --requirements pyproject.toml -c constraints.txt

      # Assert the env is fully frozen: every installed third-party dist (py10x-core's deps AND the
      # siblings' own deps) must be pinned in constraints.txt. Catches a dep that escaped the freeze.
      - name: Verify env is fully frozen against constraints.txt
        run: xx-constraints check

      # Now the kernel is installed in .venv: assert the installed version matches the tag we
      # resolved and that the compiled extension actually imports on this runner.
      - name: Verify installed siblings match their pinned tags
        run: |
          python -m dev_10x.xx_ci verify_sibling py10x-kernel
          python -m dev_10x.xx_ci verify_sibling py10x-infra

      - name: Start MongoDB (single-node replica set)
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: "7.0"
          mongodb-replica-set: rs0
          mongodb-port: 27017

      # Install the browser with the runtime venv's pinned Playwright, so the browser revision always
      # matches the installed Playwright regardless of build caching (the pyproject build hook is a
      # no-op once the browser is cached).
      - name: Install Playwright chromium
        run: playwright install --with-deps chromium

      - name: Run test suite
        env:
          PYTHONUNBUFFERED: "1"
        run: pytest

  publish:
    name: Build and publish
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-tags: true

    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"

    - name: Set up Python
      run: uv python install 3.12

    - name: Build distributions
      run: uv build

    - name: Publish to PyPI
      run: uv publish
